<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Circular text paths -->
    <path id="topArc" d="M 250,250 m -170,0 a 170,170 0 1,1 340,0" fill="none"/>
    <path id="bottomArc" d="M 250,250 m 170,0 a 170,170 0 1,1 -340,0" fill="none"/>
  </defs>

  <!-- Outer circle ring (hand-drawn style) -->
  <circle cx="250" cy="250" r="230" fill="none" stroke="#5A5A5A" stroke-width="8" opacity="0.6"/>
  <circle cx="250" cy="250" r="226" fill="none" stroke="#6B6B6B" stroke-width="3" opacity="0.3"/>

  <!-- Inner circle ring -->
  <circle cx="250" cy="250" r="172" fill="none" stroke="#8A8A8A" stroke-width="1.5" opacity="0.4"/>

  <!-- Center monogram background -->
  <rect x="185" y="185" width="130" height="130" rx="20" ry="20" fill="#B8CC3C"/>

  <!-- Stylized 'r' letter -->
  <path d="M 218,280 L 218,235 Q 218,215 235,215 L 245,215"
        fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stylized 'd' letter (mirror/connected to r) -->
  <path d="M 280,210 L 280,270 Q 280,290 260,290 L 240,290 Q 222,290 222,272 L 222,265"
        fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small spiral/cocoon accent at bottom of d -->
  <circle cx="268" cy="278" r="8" fill="none" stroke="white" stroke-width="3.5"/>
  <path d="M 268,270 Q 276,270 276,278 Q 276,286 268,286" fill="none" stroke="white" stroke-width="3"/>

  <!-- Top text: "red.cocoon" -->
  <text font-family="'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="400" letter-spacing="6" fill="#B8CC3C">
    <textPath href="#topArc" startOffset="18%" text-anchor="middle">
      red.cocoon
    </textPath>
  </text>

  <!-- Bottom text: "pottery" -->
  <text font-family="'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="400" letter-spacing="6" fill="#B8CC3C">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      pottery
    </textPath>
  </text>

  <!-- Decorative chain/link circles at top right (like in logo) -->
  <circle cx="358" cy="142" r="12" fill="none" stroke="#6B6B6B" stroke-width="4"/>
  <circle cx="375" cy="128" r="10" fill="none" stroke="#6B6B6B" stroke-width="3.5"/>
  <circle cx="368" cy="118" r="7" fill="none" stroke="#6B6B6B" stroke-width="3"/>

</svg>
